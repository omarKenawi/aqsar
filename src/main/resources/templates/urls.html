<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<section layout:fragment="content" class="container mt-5">

    <h2 class="mb-4 fw-bold">All Short URLs</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">

            <table class="table table-hover table-striped mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Short URL</th>
                    <th>Original URL</th>
                    <th>Clicks</th>
                    <th>Created At</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="url : ${urls}">

                    <!-- ID -->
                    <td th:text="${url.id}"></td>

                    <!-- Short URL (new) -->
                    <td>
                        <a th:href="@{/{key}(key=${url.shortKey})}" target="_self">

                            <span th:text="${url.fullShortUrl}"></span>

                        </a>
                    </td>

                    <!-- Original URL -->
                    <td style="max-width: 300px; word-break: break-all;"
                        th:text="${url.originalUrl}">
                    </td>


                    <!-- Click Count (new) -->
                    <td>
        <span class="badge bg-success"
              th:text="${url.clickCount}">
        </span>
                    </td>

                    <!-- Created At -->
                    <td th:text="${url.createdAt}"></td>

                </tr>
                </tbody>
            </table>
        </div>
        <nav class="mt-4" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">

                <!-- Previous -->
                <li class="page-item"
                    th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/urls(page=${currentPage - 1})}">
                        Previous
                    </a>
                </li>

                <!-- Page Numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(1, totalPages)}"
                    th:classappend="${i == currentPage} ? 'active'">

                    <a class="page-link"
                       th:text="${i}"
                       th:href="@{/urls(page=${i})}">
                    </a>

                </li>

                <!-- Next -->
                <li class="page-item"
                    th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/urls(page=${currentPage + 1})}">
                        Next
                    </a>
                </li>

            </ul>
        </nav>
    </div>

</section>

</html>
